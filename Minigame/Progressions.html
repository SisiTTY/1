<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Precision Progression Tower</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background:darkblue;
    color:white;
    text-align:center;
    overflow:hidden;
}
.screen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
button{
    padding:10px 20px;
    margin:10px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
#gameCanvas{
    background:#0b3d91;
    display:none;
}
#scoreBoard{
    position:absolute;
    top:10px;
    left:10px;
    font-size:18px;
}
</style>
</head>
<body>

<div id="startScreen" class="screen">
    <h1>📐 Precision Progression Tower</h1>
    <button onclick="startGame()">Start Game</button>
</div>

<div id="endScreen" class="screen" style="display:none">
    <h1>💥 Tower Collapsed!</h1>
    <h2 id="finalScore"></h2>
    <p id="reasonText"></p>
    <button onclick="backToMenu()">Main Menu</button>
</div>

<div id="scoreBoard"></div>
<canvas id="gameCanvas" width="600" height="600"></canvas>

<script>
let canvas=document.getElementById("gameCanvas");
let ctx=canvas.getContext("2d");

let towers=[];
let movingBlock;
let score=0;
let gameRunning=false;
let direction=1;
let speed=3;
let reason="";

function startGame(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("endScreen").style.display="none";
    canvas.style.display="block";

    towers=[];
    score=0;
    gameRunning=true;
    direction=1;
    reason="";

    generateNextBlock();
    update();
}

function backToMenu(){
    document.getElementById("endScreen").style.display="none";
    document.getElementById("startScreen").style.display="flex";
    canvas.style.display="none";
}

function randomStart(){
    return Math.floor(Math.random()*5)+2;
}

function createBlock(value){
    return {
        x:0,
        y:50,
        width:80,
        height:30,
        value:value,
        falling:false
    };
}

function generateNextBlock(){

    let options=[];

    // Valid next numbers from existing towers
    towers.forEach(tower=>{
        let last=tower.blocks[tower.blocks.length-1];

        if(tower.type==="AP"){
            options.push(last.value + tower.diff);
        }

        if(tower.type==="GP"){
            options.push(last.value * tower.ratio);
        }
    });

    // Allow new tower if less than 2
    if(towers.length < 2){
        options.push(randomStart());
    }

    let value=options[Math.floor(Math.random()*options.length)];
    movingBlock=createBlock(value);
}

function update(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,600,600);
    document.getElementById("scoreBoard").innerHTML="Score: "+score;

    // Draw towers
    towers.forEach(tower=>{
        tower.blocks.forEach(block=>{
            ctx.fillStyle=tower.type==="AP"?"orange":"lightgreen";
            ctx.fillRect(block.x,block.y,block.width,block.height);
            ctx.fillStyle="black";
            ctx.fillText(block.value,block.x+30,block.y+20);
        });
    });

    // Move block horizontally until dropped
    if(!movingBlock.falling){
        movingBlock.x+=speed*direction;

        if(movingBlock.x+movingBlock.width>600 || movingBlock.x<0){
            direction*=-1;
        }
    }else{
        movingBlock.y+=6;

        // Check landing
        if(movingBlock.y+movingBlock.height>=600){
            placeBlock();
        }else{
            for(let tower of towers){
                let top=tower.blocks[tower.blocks.length-1];
                if(
                    movingBlock.x < top.x+top.width &&
                    movingBlock.x+movingBlock.width > top.x &&
                    movingBlock.y+movingBlock.height >= top.y
                ){
                    placeBlock();
                }
            }
        }
    }

    // Draw moving block
    ctx.fillStyle="white";
    ctx.fillRect(movingBlock.x,movingBlock.y,movingBlock.width,movingBlock.height);
    ctx.fillStyle="black";
    ctx.fillText(movingBlock.value,movingBlock.x+30,movingBlock.y+20);

    requestAnimationFrame(update);
}

document.addEventListener("keydown",function(e){
    if(e.code==="Space" && gameRunning){
        movingBlock.falling=true;
    }
});

function placeBlock(){

    movingBlock.falling=false;

    // Try stacking on existing tower
    for(let tower of towers){

        let last=tower.blocks[tower.blocks.length-1];

        if(
            movingBlock.x < last.x+last.width &&
            movingBlock.x+movingBlock.width > last.x
        ){

            if(checkMatch(tower,movingBlock.value)){

                movingBlock.y=last.y-30;
                tower.blocks.push({...movingBlock});
                score+=10;
                generateNextBlock();
                return;

            }else{
                endGame();
                return;
            }
        }
    }

    // Start new tower
    if(towers.length>=2){
        reason="Maximum 2 progressions allowed (1 AP and 1 GP).";
        endGame();
        return;
    }

    let newType = towers.some(t=>t.type==="AP") ? "GP" : "AP";

    let newTower={
        type:newType,
        blocks:[],
        diff:Math.floor(Math.random()*3)+1,
        ratio:2
    };

    movingBlock.y=570;
    newTower.blocks.push({...movingBlock});
    towers.push(newTower);

    score+=5;
    generateNextBlock();
}

function checkMatch(tower,value){

    let last=tower.blocks[tower.blocks.length-1].value;

    if(tower.type==="AP"){
        if(value===last+tower.diff) return true;
        reason="Arithmetic sequence broken. Expected "+(last+tower.diff)+".";
        return false;
    }

    if(tower.type==="GP"){
        if(value===last*tower.ratio) return true;
        reason="Geometric sequence broken. Expected "+(last*tower.ratio)+".";
        return false;
    }
}

function endGame(){
    gameRunning=false;
    document.getElementById("finalScore").innerHTML="Final Score: "+score;
    document.getElementById("reasonText").innerHTML=reason;
    document.getElementById("endScreen").style.display="flex";
}
</script>

</body>
</html>
